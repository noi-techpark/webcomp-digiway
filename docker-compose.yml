version: '3'
services:
  app:
    build:
      context: .
      dockerfile: infrastructure/docker/node.dockerfile
    volumes:
      - ./:/code
      - /code/node_modules
    working_dir: /code
    command: sh -c "npm install && npm run watch -- --host 0.0.0.0"
    ports:
      - "8998:8998"
